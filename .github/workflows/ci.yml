name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, develop]

# Minimal permissions — CI only reads the repository.
permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile --ignore-scripts

      # tsc --noEmit; fails on any type error.
      - run: bun run typecheck

  lint:
    name: Lint (ESLint, zero warnings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile --ignore-scripts

      # The lint script must pass --max-warnings 0 so any warning is a failure.
      - run: bun run lint

  format:
    name: Format check (Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile --ignore-scripts

      # format:check runs `prettier --check` — exits non-zero if any file differs.
      - run: bun run format:check

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile --ignore-scripts

      # --coverage writes to coverage/ which is uploaded as an artifact below.
      - run: bun test --coverage

      # Upload coverage even on failure so we can inspect partial results.
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  build:
    name: Build
    runs-on: ubuntu-latest
    # Only build if type check, lint, and tests all pass. Format is independent
    # of the build output so it does not gate here.
    needs: [typecheck, lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile --ignore-scripts

      - run: bun run build

  markdown-lint-docs:
    name: Markdown lint (docs/ — markdownlint-obsidian)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile --ignore-scripts

      # markdownlint-obsidian-cli enforces Obsidian Flavored Markdown conventions
      # defined in .obsidian-linter.jsonc, including wikilink/embed resolution.
      # Only applied to docs/ — other Markdown is handled by markdownlint-cli2.
      - run: bunx markdownlint-obsidian-cli --config .obsidian-linter.jsonc docs/

  markdown-lint-other:
    name: Markdown lint (other — markdownlint-cli2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile --ignore-scripts

      # Lints all Markdown files that are NOT under docs/ or .github/ or
      # node_modules/. Those directories are handled separately or skipped.
      - run: bunx markdownlint-cli2 "**/*.md" "!docs/**" "!.github/**" "!node_modules/**"

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    # Only run on semver tag pushes — not on branch pushes or PRs.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [typecheck, lint, test, build]
    environment: npm-publish
    # id-token: write is required for OIDC trusted publishing (keyless).
    # No NPM_TOKEN secret is needed — npm exchanges the OIDC token for a
    # short-lived publish credential. See ADR 008.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile --ignore-scripts

      # Node 22 LTS. The Node version used to publish does not affect the LSP
      # artifact — the package is compiled by Bun/tsc; Node is only needed to
      # drive npm.
      #
      # Do NOT set registry-url here: setup-node would write
      # //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN} into .npmrc, and
      # npm treats an explicitly-keyed empty token as "auth configured but
      # invalid", blocking the OIDC exchange. Without registry-url the
      # _authToken key is absent and npm performs the OIDC exchange itself.
      # npmjs.com is already the default registry.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Bootstrap npm@latest from the registry tarball instead of using
      # `npm install -g npm@latest`. Some Node 22 releases (e.g. 22.22.2)
      # ship with a broken bundled npm whose @npmcli/arborist is missing the
      # 'promise-retry' dependency, so the npm install command crashes with
      # MODULE_NOT_FOUND before it can upgrade itself. Fetching via curl/jq
      # and running the extracted CLI directly via `node` avoids that path
      # entirely. npm@latest (9.5.0+) is required for tokenless OIDC
      # Trusted Publishing; the bundled npm predates that support.
      - name: Bootstrap npm@latest (required for tokenless OIDC Trusted Publishing)
        run: |
          TMPDIR=$(mktemp -d)
          curl -sf "$(curl -sf https://registry.npmjs.org/npm/latest | jq -r '.dist.tarball')" \
            | tar -xz --strip-components=1 -C "$TMPDIR"
          node "$TMPDIR/bin/npm-cli.js" install -g npm@latest
          rm -rf "$TMPDIR"

      - run: bun run build

      - name: Publish to npmjs.com
        # --access public is required for the first publish of a new package;
        # omitting it causes npm to return E404 even for unscoped packages.
        # Bun registry is not targeted — it lacks OIDC support (oven-sh/bun#22423)
        # and packages on npmjs.org are installable via `bun add` regardless.
        run: npm publish --provenance --access public
